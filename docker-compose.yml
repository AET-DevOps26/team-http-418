services:
  db:
    build: ./lectures_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    ports:
      - "3000:80"

  scraper:
    build: ./scraper
    profiles:
      - scraper
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
volumes:
  pgdata:
