services:
  db:
    image: ghcr.io/aet-devops26/team-http-418/db:${IMAGE_TAG:-latest}
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      COURSES_DB_NAME: ${COURSES_DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    image: ghcr.io/aet-devops26/team-http-418/server:${IMAGE_TAG:-latest}
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider http://localhost:8080/health 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  user-profile-service:
    image: ghcr.io/aet-devops26/team-http-418/user-profile-service:${IMAGE_TAG:-latest}
    env_file: .env
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider http://localhost:8080/v1/health 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

  pdf-parser:
    image: ghcr.io/aet-devops26/team-http-418/pdf-parser:${IMAGE_TAG:-latest}
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:8080/v1/health 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  genai:
    image: ghcr.io/aet-devops26/team-http-418/genai:${IMAGE_TAG:-latest}
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - db

  client:
    image: ghcr.io/aet-devops26/team-http-418/client:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped


  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    volumes:
      - ./infra/helm/aidan-monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/helm/aidan-monitoring/prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:11.5.2
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./infra/helm/aidan-monitoring/grafana:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=logsInExplore
      - GF_LOG_CONSOLECOLORS=true
    entrypoint: ["sh", "-c", "/etc/grafana/provisioning/init_grafana.sh"]
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./infra/helm/aidan-monitoring/promtail.yml:/etc/promtail/promtail.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7.3
    volumes:
      - ./infra/helm/aidan-monitoring/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASS}@db:5432/${COURSES_DB_NAME}?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

volumes:
  pgdata:
  prometheus_data:
  grafana-storage:
  loki-data: