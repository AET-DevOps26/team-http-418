name: CD — Azure VM

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/aet-devops26/team-http-418

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./services/server
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/server:latest
            ${{ env.IMAGE_PREFIX }}/server:${{ steps.meta.outputs.sha }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./services/client
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/client:latest
            ${{ env.IMAGE_PREFIX }}/client:${{ steps.meta.outputs.sha }}

      - name: Build and push user-profile-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/user-profile-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/user-profile-service:latest
            ${{ env.IMAGE_PREFIX }}/user-profile-service:${{ steps.meta.outputs.sha }}

      - name: Build and push pdf-parser image
        uses: docker/build-push-action@v6
        with:
          context: ./services/pdf-parser
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/pdf-parser:latest
            ${{ env.IMAGE_PREFIX }}/pdf-parser:${{ steps.meta.outputs.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_PRIVATE_KEY }}" > ~/.ssh/aidan_azure
          chmod 600 ~/.ssh/aidan_azure

      - name: Update inventory with VM IP
        run: |
          sed -i "s/PLACEHOLDER_VM_IP/${{ secrets.AZURE_VM_IP }}/" infra/ansible/inventory.ini

      - name: Deploy via Ansible
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          ansible-playbook infra/ansible/playbook.yml --private-key ~/.ssh/aidan_azure
