name: CD — Azure VM

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      revision:
        description: Immutable 40-character commit SHA reachable from main
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/aet-devops26/team-http-418

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.revision || github.sha }}
          fetch-depth: 0
          lfs: true

      - name: Validate the requested deployment revision
        if: inputs.revision != ''
        env:
          REVISION: ${{ inputs.revision }}
        run: |
          set -Eeuo pipefail
          [[ "$REVISION" =~ ^[0-9a-f]{40}$ ]] || { echo "revision must be a full commit SHA" >&2; exit 1; }
          git cat-file -e "$REVISION^{commit}"
          git fetch origin main
          git merge-base --is-ancestor "$REVISION" origin/main || {
            echo "revision must be reachable from main" >&2
            exit 1
          }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./services/server
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/server:latest
            ${{ env.IMAGE_PREFIX }}/server:${{ steps.meta.outputs.sha }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./services/client
          build-args: |
            API_VERSION=${{ vars.API_VERSION }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/client:latest
            ${{ env.IMAGE_PREFIX }}/client:${{ steps.meta.outputs.sha }}

      - name: Build and push user-profile-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/user-profile-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/user-profile-service:latest
            ${{ env.IMAGE_PREFIX }}/user-profile-service:${{ steps.meta.outputs.sha }}

      - name: Build and push pdf-parser image
        uses: docker/build-push-action@v6
        with:
          context: ./services/pdf-parser
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/pdf-parser:latest
            ${{ env.IMAGE_PREFIX }}/pdf-parser:${{ steps.meta.outputs.sha }}

      - name: Build and push genai image
        uses: docker/build-push-action@v6
        with:
          context: ./services/genai
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/genai:latest
            ${{ env.IMAGE_PREFIX }}/genai:${{ steps.meta.outputs.sha }}

      - name: Build and push db image
        uses: docker/build-push-action@v6
        with:
          context: ./infra/db
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/db:latest
            ${{ env.IMAGE_PREFIX }}/db:${{ steps.meta.outputs.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production-azure
    concurrency:
      group: production-azure
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Ansible
        run: python -m pip install 'ansible-core==2.18.7'

      - name: Validate deployment secrets and prepare SSH
        env:
          VM_IP: ${{ secrets.AZURE_VM_IP }}
          SSH_PRIVATE_KEY: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
        run: |
          set -Eeuo pipefail
          [ -n "$VM_IP" ] || { echo "AZURE_VM_IP is required" >&2; exit 1; }
          [ -n "$SSH_PRIVATE_KEY" ] || { echo "AZURE_SSH_PRIVATE_KEY is required" >&2; exit 1; }
          python - <<'PY'
          import ipaddress
          import os
          ipaddress.IPv4Address(os.environ["VM_IP"])
          PY
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/aidan_azure
          chmod 600 ~/.ssh/aidan_azure

      - name: Render and validate the inventory
        env:
          VM_IP: ${{ secrets.AZURE_VM_IP }}
          ANSIBLE_CONFIG: infra/ansible/ansible.cfg
        run: |
          set -Eeuo pipefail
          sed "s/PLACEHOLDER_VM_IP/$VM_IP/" infra/ansible/inventory.ini > infra/ansible/inventory.rendered.ini
          inventory=$(ansible-inventory -i infra/ansible/inventory.rendered.ini --list)
          jq -e '._meta.hostvars | keys == ["aidan_vm"]' <<< "$inventory" >/dev/null || {
            echo "Inventory must resolve exactly one host named aidan_vm" >&2
            exit 1
          }

      - name: Verify Ansible connectivity before deployment
        env:
          ANSIBLE_CONFIG: infra/ansible/ansible.cfg
        run: |
          ansible aidan_vm -i infra/ansible/inventory.rendered.ini \
            --private-key ~/.ssh/aidan_azure -m ping

      - name: Deploy via Ansible
        env:
          ANSIBLE_CONFIG: infra/ansible/ansible.cfg
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          LOGOS_API_KEY: ${{ secrets.LOGOS_API_KEY }}
          APP_JWT_SECRET: ${{ secrets.APP_JWT_SECRET }}
          GF_SECURITY_ADMIN_USER: ${{ secrets.GF_SECURITY_ADMIN_USER }}
          GF_SECURITY_ADMIN_PASSWORD: ${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
        run: |
          ansible-playbook -i infra/ansible/inventory.rendered.ini \
            infra/ansible/playbook.yml --private-key ~/.ssh/aidan_azure

      - name: Verify the deployed service from outside the VM
        env:
          VM_IP: ${{ secrets.AZURE_VM_IP }}
        run: |
          set -Eeuo pipefail
          for path in / /api/health; do
            curl --fail --show-error --silent --retry 6 --retry-all-errors \
              --connect-timeout 10 "http://$VM_IP$path" >/dev/null
          done
