name: CI

on:
  pull_request:
    branches: [main]

jobs:
  genai-quality-impact:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        uses: ./.github/actions/genai-quality-filter
        with:
          base: ${{ github.event.pull_request.base.sha }}
          ref: ${{ github.event.pull_request.head.sha }}

  genai-deterministic:
    needs: genai-quality-impact
    runs-on: ubuntu-latest
    # A skipped step keeps this required job successful for unrelated changes.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install GenAI test dependencies
        if: needs.genai-quality-impact.outputs.changed == 'true'
        working-directory: ./services/genai
        run: pip install -r requirements.txt
      - name: Run GenAI data-contract and prompt checks
        if: needs.genai-quality-impact.outputs.changed == 'true'
        working-directory: ./services/genai
        run: pytest -q tests
      - name: Audit committed course catalog
        if: needs.genai-quality-impact.outputs.changed == 'true'
        run: python3 scripts/audit_genai_catalog.py --sample-output genai-catalog-inspection-sample.json
      - name: Upload catalog inspection sample
        if: needs.genai-quality-impact.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: genai-catalog-inspection-sample
          path: genai-catalog-inspection-sample.json
          retention-days: 30

  test-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  test-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

  build-images:
    runs-on: ubuntu-latest
    needs: [test-client, test-server, genai-deterministic]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker builds
        run: docker compose build
