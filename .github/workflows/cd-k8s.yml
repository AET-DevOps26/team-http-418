name: CD — Kubernetes

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/aet-devops26/team-http-418

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./services/server
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/server:latest
            ${{ env.IMAGE_PREFIX }}/server:${{ steps.meta.outputs.sha }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./services/client
          build-args: |
            API_VERSION=${{ vars.API_VERSION }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/client:latest
            ${{ env.IMAGE_PREFIX }}/client:${{ steps.meta.outputs.sha }}

      - name: Build and push genai image
        uses: docker/build-push-action@v6
        with:
          context: ./services/genai
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/genai:latest
            ${{ env.IMAGE_PREFIX }}/genai:${{ steps.meta.outputs.sha }}

      - name: Build and push db image
        uses: docker/build-push-action@v6
        with:
          context: ./infra/db
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/db:latest
            ${{ env.IMAGE_PREFIX }}/db:${{ steps.meta.outputs.sha }}

      - name: Build and push user-profile-service image
        uses: docker/build-push-action@v6
        with:
          context: ./services/user-profile-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/user-profile-service:latest
            ${{ env.IMAGE_PREFIX }}/user-profile-service:${{ steps.meta.outputs.sha }}

      - name: Build and push pdf-parser image
        uses: docker/build-push-action@v6
        with:
          context: ./services/pdf-parser
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/pdf-parser:latest
            ${{ env.IMAGE_PREFIX }}/pdf-parser:${{ steps.meta.outputs.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ vars.ENABLE_K8S_DEPLOY == 'true' }}
    environment: production-k8s
    concurrency:
      group: production-k8s
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply namespace manifests
        run: kubectl apply -f infra/k8s/namespace.yml

      - name: Create GHCR pull secret in cluster namespaces
        run: |
          for ns in aidan aidan-monitoring; do
            kubectl create secret docker-registry ghcr-pull-secret \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GHCR_PULL_TOKEN }} \
              --namespace=$ns \
              --dry-run=client -o yaml | kubectl apply -f -
          done

      - name: Reset failed Helm release
        run: |
          STATUS=$(helm status aidan -n aidan -o json 2>/dev/null | jq -r '.info.status' 2>/dev/null || echo "not-found")
          if [ "$STATUS" = "pending-install" ] || [ "$STATUS" = "pending-upgrade" ] || [ "$STATUS" = "pending-rollback" ]; then
            echo "Helm release stuck in $STATUS — rolling back"
            helm rollback aidan 0 -n aidan --force || helm uninstall aidan -n aidan --no-hooks || true
          elif [ "$STATUS" = "failed" ]; then
            echo "Helm release in failed state — will let upgrade --install handle it"
          fi

          # Also handle monitoring release if it is in a stuck state
          MSTATUS=$(helm status aidan-monitoring -n aidan-monitoring -o json 2>/dev/null | jq -r '.info.status' 2>/dev/null || echo "not-found")
          if [ "$MSTATUS" = "pending-install" ] || [ "$MSTATUS" = "pending-upgrade" ] || [ "$MSTATUS" = "pending-rollback" ]; then
            echo "Monitoring Helm release stuck in $MSTATUS — rolling back"
            helm rollback aidan-monitoring 0 -n aidan-monitoring --force || helm uninstall aidan-monitoring -n aidan-monitoring --no-hooks || true
          elif [ "$MSTATUS" = "failed" ]; then
            echo "Monitoring Helm release in failed state — will let upgrade --install handle it"
          fi

      - name: Clean up stuck pods
        run: |
          kubectl delete pods -n aidan --field-selector=status.phase==Failed --ignore-not-found
          for pod in $(kubectl get pods -n aidan -o jsonpath='{range .items[?(@.metadata.deletionTimestamp)]}{.metadata.name}{"\n"}{end}'); do
            kubectl delete pod "$pod" -n aidan --force --grace-period=0 || true
          done

          # also clean up in monitoring namespace
          kubectl delete pods -n aidan-monitoring --field-selector=status.phase==Failed --ignore-not-found
          for pod in $(kubectl get pods -n aidan-monitoring -o jsonpath='{range .items[?(@.metadata.deletionTimestamp)]}{.metadata.name}{"\n"}{end}'); do
            kubectl delete pod "$pod" -n aidan-monitoring --force --grace-period=0 || true
          done

      - name: Quiesce applications and expand PostgreSQL storage
        id: postgres-preflight
        run: |
          set -Eeuo pipefail
          replicas=""
          for deployment in server client genai user-profile-service pdf-parser; do
            if kubectl get deployment "$deployment" -n aidan >/dev/null 2>&1; then
              count=$(kubectl get deployment "$deployment" -n aidan -o jsonpath='{.spec.replicas}')
              replicas+="${deployment}=${count},"
            fi
          done
          echo "replicas=${replicas}" >> "$GITHUB_OUTPUT"

          if ! kubectl get pvc postgres-pvc -n aidan >/dev/null 2>&1; then
            echo "No existing PostgreSQL PVC; this is a fresh install."
            exit 0
          fi
          storage_class=$(kubectl get pvc postgres-pvc -n aidan -o jsonpath='{.spec.storageClassName}')
          [ -n "$storage_class" ] || { echo "postgres-pvc has no storage class" >&2; exit 1; }
          [ "$(kubectl get storageclass "$storage_class" -o jsonpath='{.allowVolumeExpansion}')" = "true" ] || {
            echo "StorageClass $storage_class does not allow volume expansion" >&2; exit 1;
          }

          for deployment in server client genai user-profile-service pdf-parser; do
            kubectl get deployment "$deployment" -n aidan >/dev/null 2>&1 && kubectl scale deployment "$deployment" -n aidan --replicas=0
          done
          kubectl patch pvc postgres-pvc -n aidan --type merge -p '{"spec":{"resources":{"requests":{"storage":"5Gi"}}}}'
          kubectl wait --for=jsonpath='{.status.capacity.storage}'=5Gi pvc/postgres-pvc -n aidan --timeout=10m

          if kubectl get pvc postgres-pvc -n aidan -o jsonpath='{range .status.conditions[?(@.type=="FileSystemResizePending")]}{.status}{end}' | grep -q True; then
            postgres_replicas=$(kubectl get deployment postgres -n aidan -o jsonpath='{.spec.replicas}')
            kubectl scale deployment postgres -n aidan --replicas=0
            kubectl wait --for=delete pod -l app=postgres -n aidan --timeout=5m || true
            kubectl scale deployment postgres -n aidan --replicas="$postgres_replicas"
            kubectl rollout status deployment/postgres -n aidan --timeout=10m
          fi

      - name: Deploy via Helm
        run: |
          helm upgrade --install aidan ./infra/helm/aidan \
            -f ./infra/helm/aidan/values-prod.yaml \
            --set image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set postgres.image=${{ env.IMAGE_PREFIX }}/db:${{ needs.build-and-push.outputs.image_tag }} \
            --set postgres.password=${{ secrets.DB_PASSWORD }} \
            --set jwt.secret=${{ secrets.APP_JWT_SECRET }} \
            --set genai.logosApiKey=${{ secrets.LOGOS_API_KEY }} \
            --namespace aidan \
            --wait \
            --timeout 25m

      - name: Deploy monitoring via Helm
        run: |
          helm upgrade --install aidan-monitoring ./infra/helm/aidan-monitoring \
            -f ./infra/helm/aidan-monitoring/values-prod.yaml \
            --set grafana.adminUser=${{ secrets.GF_SECURITY_ADMIN_USER }} \
            --set grafana.adminPassword=${{ secrets.GF_SECURITY_ADMIN_PASSWORD }} \
            --set postgresExporter.password=${{ secrets.DB_PASSWORD }} \
            --namespace aidan-monitoring \
            --wait \
            --timeout 5m

      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods -n aidan
          kubectl get pvc -n aidan
          kubectl get events -n aidan --sort-by='.lastTimestamp'
          kubectl describe pods -n aidan
          kubectl logs -l app=postgres -n aidan --tail=50 || true
          kubectl logs -l app=client -n aidan --tail=50 || true
          kubectl logs -l app=server -n aidan --tail=50 || true
          kubectl logs -l app=genai -n aidan --tail=50 || true
          kubectl logs -l app=user-profile-service -n aidan --tail=50 || true
          kubectl logs -l app=pdf-parser -n aidan --tail=50 || true
          kubectl logs -n aidan job/aidan-courses-seed --tail=200 || true
          kubectl get pods -n aidan-monitoring
          kubectl get events -n aidan-monitoring --sort-by='.lastTimestamp'
          kubectl describe pods -n aidan-monitoring

      - name: Restore application replicas on failure
        if: failure()
        run: |
          IFS=',' read -ra saved <<< "${{ steps.postgres-preflight.outputs.replicas }}"
          for item in "${saved[@]}"; do
            [ -n "$item" ] || continue
            deployment=${item%%=*}
            replicas=${item#*=}
            kubectl scale deployment "$deployment" -n aidan --replicas="$replicas" || true
          done
