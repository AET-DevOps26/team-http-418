name: CD — Kubernetes

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/aet-devops26/team-http-418

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/server:latest
            ${{ env.IMAGE_PREFIX }}/server:${{ steps.meta.outputs.sha }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/client:latest
            ${{ env.IMAGE_PREFIX }}/client:${{ steps.meta.outputs.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ vars.ENABLE_K8S_DEPLOY == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=aidan \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Clean up stuck pods
        run: |
          kubectl delete pods -n aidan --field-selector=status.phase==Failed --ignore-not-found
          for pod in $(kubectl get pods -n aidan -o jsonpath='{range .items[?(@.metadata.deletionTimestamp)]}{.metadata.name}{"\n"}{end}'); do
            kubectl delete pod "$pod" -n aidan --force --grace-period=0 || true
          done

      - name: Deploy via Helm
        run: |
          helm upgrade --install aidan ./helm/aidan \
            -f ./helm/aidan/values-prod.yaml \
            --set image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set postgres.password=${{ secrets.DB_PASSWORD }} \
            --namespace aidan \
            --wait \
            --timeout 7m

      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods -n aidan
          kubectl get pvc -n aidan
          kubectl get events -n aidan --sort-by='.lastTimestamp'
          kubectl describe pods -n aidan
          kubectl logs -l app=postgres -n aidan --tail=50 || true
          kubectl logs -l app=client -n aidan --tail=50 || true
          kubectl logs -l app=server -n aidan --tail=50 || true
