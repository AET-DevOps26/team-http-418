name: CD — Preview Deploy

on:
  pull_request:
    types: [labeled, synchronize]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/aet-devops26/team-http-418

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'deployment-preview')
    permissions:
      contents: read
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "sha=pr-${{ github.event.pull_request.number }}-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./services/server
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/server:${{ steps.meta.outputs.sha }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./services/client
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/client:${{ steps.meta.outputs.sha }}

      - name: Build and push genai image
        uses: docker/build-push-action@v6
        with:
          context: ./services/genai
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/genai:${{ steps.meta.outputs.sha }}

      - name: Build and push db image
        uses: docker/build-push-action@v6
        with:
          context: ./infra/db
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/db:${{ steps.meta.outputs.sha }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_PULL_TOKEN }} \
            --namespace=aidan \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Reset failed Helm release
        run: |
          STATUS=$(helm status aidan -n aidan -o json 2>/dev/null | jq -r '.info.status' 2>/dev/null || echo "not-found")
          if [ "$STATUS" = "pending-install" ] || [ "$STATUS" = "pending-upgrade" ] || [ "$STATUS" = "pending-rollback" ]; then
            echo "Helm release stuck in $STATUS — rolling back"
            helm rollback aidan 0 -n aidan --force || helm uninstall aidan -n aidan --no-hooks || true
          elif [ "$STATUS" = "failed" ]; then
            echo "Helm release in failed state — will let upgrade --install handle it"
          fi

      - name: Clean up stuck pods
        run: |
          kubectl delete pods -n aidan --field-selector=status.phase==Failed --ignore-not-found
          for pod in $(kubectl get pods -n aidan -o jsonpath='{range .items[?(@.metadata.deletionTimestamp)]}{.metadata.name}{"\n"}{end}'); do
            kubectl delete pod "$pod" -n aidan --force --grace-period=0 || true
          done

      - name: Deploy via Helm
        run: |
          helm upgrade --install aidan ./infra/helm/aidan \
            -f ./infra/helm/aidan/values-prod.yaml \
            --set image.tag=${{ steps.meta.outputs.sha }} \
            --set postgres.image=${{ env.IMAGE_PREFIX }}/db:${{ steps.meta.outputs.sha }} \
            --set postgres.password=${{ secrets.DB_PASSWORD }} \
            --set jwt.secret=${{ secrets.APP_JWT_SECRET }} \
            --set genai.logosApiKey=${{ secrets.LOGOS_API_KEY }} \
            --namespace aidan \
            --wait \
            --timeout 7m

      - name: Comment on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed from commit \`${context.sha.substring(0, 7)}\`\n\n- Client: https://aidan.aet.cit.tum.de/\n- Server health: https://aidan.aet.cit.tum.de/api/health\n\n⚠️ This replaced the current deployment. Merging to \`main\` will redeploy from main.`
            })

      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods -n aidan
          kubectl get pvc -n aidan
          kubectl get events -n aidan --sort-by='.lastTimestamp'
          kubectl describe pods -n aidan
          kubectl logs -l app=postgres -n aidan --tail=50 || true
          kubectl logs -l app=client -n aidan --tail=50 || true
          kubectl logs -l app=server -n aidan --tail=50 || true
          kubectl logs -l app=genai -n aidan --tail=50 || true
