name: CD — Preview Images

on:
  pull_request:
    types: [labeled, synchronize]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/aet-devops26/team-http-418

jobs:
  build-preview-images:
    if: contains(github.event.pull_request.labels.*.name, 'deployment-preview')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "sha=pr-${{ github.event.pull_request.number }}-$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push preview images
        uses: docker/bake-action@v6
        with:
          files: docker-compose.yml
          targets: server,client,genai,db,user-profile-service,pdf-parser
          push: true
          set: |
            client.args.API_VERSION=${{ vars.API_VERSION }}
            server.tags=${{ env.IMAGE_PREFIX }}/server:${{ steps.meta.outputs.sha }}
            client.tags=${{ env.IMAGE_PREFIX }}/client:${{ steps.meta.outputs.sha }}
            genai.tags=${{ env.IMAGE_PREFIX }}/genai:${{ steps.meta.outputs.sha }}
            db.tags=${{ env.IMAGE_PREFIX }}/db:${{ steps.meta.outputs.sha }}
            user-profile-service.tags=${{ env.IMAGE_PREFIX }}/user-profile-service:${{ steps.meta.outputs.sha }}
            pdf-parser.tags=${{ env.IMAGE_PREFIX }}/pdf-parser:${{ steps.meta.outputs.sha }}
