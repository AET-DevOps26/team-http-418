apiVersion: v1
kind: ConfigMap
metadata:
  name: aidan-config
  namespace: aidan
data:
  DB_USER: "postgres"
  DB_HOST: "postgres-service"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-service:5432"
  SPRING_DATASOURCE_USERNAME: "postgres"
