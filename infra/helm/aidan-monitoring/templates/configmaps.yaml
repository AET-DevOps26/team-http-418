apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.namespace }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/prometheus-rules.yml

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets:
              - localhost:{{ .Values.prometheus.port }}

      - job_name: "server"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets:
              - server-service.{{ .Values.appNamespace }}.svc.cluster.local:{{ .Values.prometheus.appServerPort | default 8080 }}

      - job_name: "genai"
        metrics_path: "/metrics"
        static_configs:
          - targets:
              - genai.{{ .Values.appNamespace }}.svc.cluster.local:{{ .Values.prometheus.appGenaiPort | default 8000 }}

      - job_name: "user-profile-service"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets:
              - user-profile-service.{{ .Values.appNamespace }}.svc.cluster.local:{{ .Values.prometheus.appUserProfilePort | default 8060 }}

      - job_name: "pdf-parser"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets:
              - pdf-parser.{{ .Values.appNamespace }}.svc.cluster.local:{{ .Values.prometheus.appPdfParserPort | default 8070 }}

      - job_name: "postgres"
        static_configs:
          - targets:
              - postgres-exporter:{{ .Values.postgresExporter.port }}

      - job_name: "cadvisor"
        static_configs:
          - targets:
              - cadvisor:{{ .Values.cadvisor.port }}
  prometheus-rules.yml: |
{{ .Files.Get "prometheus-rules.yml" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: {{ .Values.namespace }}
data:
  loki-config.yaml: |
{{ .Files.Get "loki-config.yaml" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: {{ .Values.namespace }}
data:
  promtail.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:{{ .Values.loki.port }}/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - cri: {}
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: __host__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - action: replace
            source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - action: replace
            source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - action: replace
            source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - replacement: /var/log/pods/*$1/*.log
            separator: /
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.namespace }}
data:
  prometheus.yaml: |
{{ .Files.Get "grafana/datasources/prometheus.yaml" | indent 4 }}
