apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: {{ .Values.namespace }}
  labels:
    app: cadvisor
    {{- include "aidan-monitoring.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: cadvisor
  template:
    metadata:
      labels:
        app: cadvisor
    spec:
      automountServiceAccountToken: false
      containers:
        - name: cadvisor
          image: {{ .Values.cadvisor.image }}
          ports:
            - containerPort: {{ .Values.cadvisor.port }}
          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
            - name: var-run
              mountPath: /var/run
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: docker
              mountPath: /var/lib/docker
              readOnly: true
            - name: containerd
              mountPath: /var/lib/containerd
              readOnly: true
          resources:
            {{- toYaml .Values.cadvisor.resources | nindent 12 }}
      volumes:
        - name: rootfs
          hostPath:
            path: /
        - name: var-run
          hostPath:
            path: /var/run
        - name: sys
          hostPath:
            path: /sys
        - name: docker
          hostPath:
            path: /var/lib/docker
        - name: containerd
          hostPath:
            path: /var/lib/containerd
---
apiVersion: v1
kind: Service
metadata:
  name: cadvisor
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: cadvisor
  ports:
    - port: {{ .Values.cadvisor.port }}
      targetPort: {{ .Values.cadvisor.port }}
