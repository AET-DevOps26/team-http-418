groups:
  - name: system
    rules:
      - alert: HighContainerCPUUsage
        expr: sum(rate(container_cpu_usage_seconds_total[5m])) by (instance) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High container CPU usage on {{ $labels.instance }}"
          description: "Average container CPU usage is above 0.8 cores for 10 minutes."

      - alert: HighContainerMemoryUsage
        expr: sum(container_memory_usage_bytes) by (instance) > 500000000
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "High container memory usage on {{ $labels.instance }}"
          description: "Container memory usage is above 500MiB on {{ $labels.instance }}."
