apiVersion: v1
kind: Secret
metadata:
  name: aidan-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  DB_PASS: {{ .Values.postgres.password | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.postgres.password | quote }}
  APP_JWT_SECRET: {{ required "jwt.secret is required" .Values.jwt.secret | quote }}
  LOGOS_API_KEY: {{ .Values.genai.logosApiKey | default "" | quote }}
  GF_SECURITY_ADMIN_USER: {{ .Values.grafana.adminUser | default "" | quote }}
  GF_SECURITY_ADMIN_PASSWORD: {{ .Values.grafana.adminPassword | default "" | quote }}
