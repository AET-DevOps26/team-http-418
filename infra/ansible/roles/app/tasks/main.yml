- name: Create app directory
  file:
    path: /opt/aidan
    state: directory
    owner: azureuser
    group: azureuser
    mode: '0755'

- name: Copy monitoring configuration files
  copy:
    src: "{{ playbook_dir }}/../../infra/helm/aidan-monitoring/{{ item }}"
    dest: "/opt/aidan/monitoring/{{ item }}"
    owner: azureuser
    group: azureuser
    mode: '0644'
  loop:
    - prometheus.yml
    - prometheus-rules.yml
    - loki-config.yaml
    - promtail.yml

- name: Copy Grafana provisioning directory
  copy:
    src: "{{ playbook_dir }}/../../infra/helm/aidan-monitoring/grafana/"
    dest: "/opt/aidan/monitoring/grafana/"
    owner: azureuser
    group: azureuser
    mode: '0644'

- name: Login to GHCR
  shell: echo "{{ ghcr_token }}" | docker login ghcr.io -u "{{ ghcr_username }}" --password-stdin
  become_user: azureuser
  no_log: true

- name: Template docker-compose.prod.yml
  template:
    src: docker-compose.prod.yml.j2
    dest: /opt/aidan/docker-compose.yml
    owner: azureuser
    group: azureuser
    mode: '0644'

- name: Template .env file
  template:
    src: .env.j2
    dest: /opt/aidan/.env
    owner: azureuser
    group: azureuser
    mode: '0600'

- name: Pull latest images
  shell: docker compose pull
  args:
    chdir: /opt/aidan
  become_user: azureuser

- name: Stop application services for course migration
  shell: docker compose stop server client user-profile-service pdf-parser genai || true
  args:
    chdir: /opt/aidan
  become_user: azureuser

- name: Start PostgreSQL for course migration
  shell: docker compose up -d db
  args:
    chdir: /opt/aidan
  become_user: azureuser

- name: Wait for PostgreSQL
  shell: docker compose exec -T db pg_isready -U postgres
  args:
    chdir: /opt/aidan
  become_user: azureuser
  register: postgres_ready
  retries: 30
  delay: 2
  until: postgres_ready.rc == 0

- name: Seed courses database
  shell: docker compose run --rm db-seed
  args:
    chdir: /opt/aidan
  become_user: azureuser

- name: Start application after successful course migration
  shell: docker compose up -d --remove-orphans
  args:
    chdir: /opt/aidan
  become_user: azureuser