apiVersion: v1
kind: Secret
metadata:
  name: aidan-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  DB_PASS: {{ .Values.postgres.password | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.postgres.password | quote }}
  LOGOS_API_KEY: {{ .Values.genai.logosApiKey | default "" | quote }}
