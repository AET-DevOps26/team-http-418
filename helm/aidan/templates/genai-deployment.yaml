apiVersion: apps/v1
kind: Deployment
metadata:
  name: genai
  namespace: {{ .Values.namespace }}
  labels:
    app: genai
    {{- include "aidan.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.genai }}
  selector:
    matchLabels:
      app: genai
  template:
    metadata:
      labels:
        app: genai
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 15
      initContainers:
        - name: wait-for-postgres
          image: postgres:17
          command: ["sh", "-c", "until pg_isready -h postgres-service -p {{ .Values.postgres.port }}; do echo waiting for postgres; sleep 2; done"]
      containers:
        - name: genai
          image: {{ printf "%s/%s/%s/genai:%s" .Values.image.registry .Values.image.org .Values.image.repo .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.genai.port }}
          envFrom:
            - configMapRef:
                name: aidan-config
            - secretRef:
                name: aidan-secret
          env:
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: aidan-secret
                  key: DB_PASS
            - name: DATABASE_URL
              value: {{ printf "postgresql://%s:$(DB_PASS)@postgres-service:%d/courses-data" .Values.postgres.username (.Values.postgres.port | int) }}
          resources:
            {{- toYaml .Values.genai.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.genai.port }}
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.genai.port }}
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.genai.port }}
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
