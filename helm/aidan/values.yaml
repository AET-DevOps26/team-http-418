global:
  imagePullSecrets: []

image:
  registry: ghcr.io
  org: aet-devops26
  repo: team-http-418
  tag: latest
  pullPolicy: IfNotPresent

replicaCount:
  server: 1
  client: 1
  postgres: 1
  genai: 1

server:
  port: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

client:
  port: 80
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

postgres:
  image: pgvector/pgvector:pg17
  port: 5432
  database: aidan
  username: postgres
  password: changeme
  storage: 1Gi
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

genai:
  port: 8000
  llmProvider: "cloud"
  logosBaseUrl: "https://logos.aet.cit.tum.de"
  logosApiVersion: "v1"
  logosModel: "openai/gpt-oss-120b"
  embeddingModelCloud: "Qwen/Qwen3-Embedding-8B"
  logosApiKey: ""
  resources:
    requests:
      memory: "384Mi"
      cpu: "200m"
    limits:
      memory: "768Mi"
      cpu: "500m"

ingress:
  enabled: true
  className: nginx
  host: ""
  annotations: {}

jwt:
  secret: ""

namespace: aidan
