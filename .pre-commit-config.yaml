repos:
  - repo: local
    hooks:
      - id: biome-check
        name: Biome Check
        language: system
        entry: bash -c 'cd client && npx biome check --write --no-errors-on-unmatched'
        files: ^client/
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(scraper|genai)/
      - id: ruff-format
        files: ^(scraper|genai)/

  - repo: local
    hooks:
      - id: spotless-server-java
        name: Spotless Java - server
        language: system
        entry: bash -c 'cd server && ./gradlew spotlessApply && ./gradlew rewriteRun'
        files: ^server/.*\.java$
        pass_filenames: false

      - id: spotless-pdf-parser
        name: Spotless Java - pdf-parser
        language: system
        entry: bash -c 'cd pdf-parser && ./gradlew spotlessApply && ./gradlew rewriteRun'
        files: ^pdf-parser/.*\.java$
        pass_filenames: false

      - id: spotless-user-profile-java
        name: Spotless Java - user-profile
        language: system
        entry: bash -c 'cd user-profile-service && ./gradlew spotlessApply && ./gradlew rewriteRun'
        files: ^user-profile-service/.*\.java$
        pass_filenames: false