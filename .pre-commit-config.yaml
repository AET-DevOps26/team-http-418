repos:
  - repo: local
    hooks:
      - id: biome-check
        name: Biome Check
        language: system
        entry: bash -c 'cd client && npx biome check --write --no-errors-on-unmatched'
        files: ^client/
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(scraper|genai)/
      - id: ruff-format
        files: ^(scraper|genai)/

  - repo: local
    hooks:
      - id: spotless-java
        name: Spotless Java
        language: system
        entry: bash -c 'cd server && ./gradlew spotlessApply'
        files: \.java$
        pass_filenames: false
